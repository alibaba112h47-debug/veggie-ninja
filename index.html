  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Booster</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">
  <h2>🚀 Daily Booster</h2>

  <div class="buttons">
    <button onclick="suggest('bored')">😴</button>
    <button onclick="suggest('sad')">😢</button>
    <button onclick="suggest('happy')">😃</button>
  </div>

  <div id="result">Select mood</div>

  <button id="doneBtn" onclick="markDone()">✅ Done</button>
  <button id="installBtn">📲 Install App</button>

  <div class="stats">
    <p>🔥 <span id="streak">0</span></p>
    <p>🏆 <span id="points">0</span></p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
